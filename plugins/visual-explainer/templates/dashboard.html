<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metrics Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"><\/script>
  <style>
    /* Blueprint preset — teal/slate, IBM Plex, data-dense */
    :root {
      --font-body: 'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface-elevated: #f8fafc;
      --surface-header: #0f172a;
      --border: rgba(0,0,0,0.07);
      --border-bright: rgba(0,0,0,0.13);
      --text: #0f172a;
      --text-dim: #64748b;
      --text-header: #f1f5f9;
      --accent: #0891b2;         /* teal-600 */
      --accent-dim: rgba(8,145,178,0.10);
      --green: #059669;
      --green-dim: rgba(5,150,105,0.10);
      --red: #dc2626;
      --red-dim: rgba(220,38,38,0.10);
      --amber: #d97706;
      --amber-dim: rgba(217,119,6,0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a1120;
        --surface: #111827;
        --surface-elevated: #1e2a3a;
        --surface-header: #060d1c;
        --border: rgba(255,255,255,0.06);
        --border-bright: rgba(255,255,255,0.12);
        --text: #e2e8f0;
        --text-dim: #64748b;
        --accent: #22d3ee;
        --accent-dim: rgba(34,211,238,0.10);
        --green: #34d399;
        --green-dim: rgba(52,211,153,0.10);
        --red: #f87171;
        --red-dim: rgba(248,113,113,0.10);
        --amber: #fbbf24;
        --amber-dim: rgba(251,191,36,0.10);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-wrap: break-word;
    }

    /* ---- Top header bar ---- */
    .dash-header {
      background: var(--surface-header);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .dash-header__brand { display: flex; align-items: center; gap: 12px; }

    .dash-header__dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .dash-header__title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-header);
      letter-spacing: -0.2px;
    }

    .dash-header__subtitle {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .dash-header__meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: #64748b;
      text-align: right;
      line-height: 1.7;
    }

    /* ---- Body ---- */
    .dash-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    /* ---- KPI Row ---- */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      animation: fadeScale 0.4s ease-out both;
      animation-delay: calc(var(--i, 0) * 0.07s);
    }

    /* Colored top-border accent */
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--kpi-accent, var(--accent));
    }

    .kpi-card__label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .kpi-card__value {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -1px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .kpi-card__trend {
      font-family: var(--font-mono);
      font-size: 11px;
      margin-top: 8px;
    }
    .kpi-card__trend--up   { color: var(--green); }
    .kpi-card__trend--down { color: var(--red); }
    .kpi-card__trend--flat { color: var(--text-dim); }

    /* ---- Section label ---- */
    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ---- Charts ---- */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      animation: fadeUp 0.5s ease-out 0.15s both;
    }

    .chart-card__title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .chart-card__subtitle {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .chart-card canvas { max-height: 210px; }

    /* ---- Data Table ---- */
    .table-section { animation: fadeUp 0.5s ease-out 0.25s both; }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead { position: sticky; top: 0; z-index: 2; }

    .data-table th {
      background: var(--surface-elevated);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-align: left;
      padding: 11px 16px;
      border-bottom: 2px solid var(--border-bright);
      white-space: nowrap;
    }

    .data-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr { transition: background 0.12s ease; }
    .data-table tbody tr:hover { background: var(--accent-dim); }

    .data-table td.num {
      text-align: right;
      font-family: var(--font-mono);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .data-table code {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* Status badges */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 5px;
      white-space: nowrap;
    }
    .status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .status--healthy  { background: var(--green-dim); color: var(--green); }
    .status--degraded { background: var(--amber-dim); color: var(--amber); }
    .status--alert    { background: var(--red-dim);   color: var(--red); }

    /* Method badge */
    .method {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .method--get    { background: var(--accent-dim); color: var(--accent); }
    .method--post   { background: var(--green-dim);  color: var(--green); }
    .method--put    { background: var(--amber-dim);  color: var(--amber); }
    .method--delete { background: var(--red-dim);    color: var(--red); }

    /* Sparkline */
    .sparkline { display: inline-block; vertical-align: middle; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Responsive */
    @media (max-width: 920px) {
      .kpi-row    { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .dash-header { padding: 16px 20px; }
      .dash-body   { padding: 20px 16px 60px; }
    }

    /* Print */
    @media print {
      .dash-header { background: #0f172a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: white !important; }
      .kpi-card, .chart-card { break-inside: avoid; }
    }
  </style>
</head>
<body>

<header class="dash-header">
  <div class="dash-header__brand">
    <div class="dash-header__dot"></div>
    <div>
      <div class="dash-header__title">Metrics Dashboard</div>
      <div class="dash-header__subtitle">System Performance Overview</div>
    </div>
  </div>
  <div class="dash-header__meta">
    Updated: March 2026<br>
    Period: Last 30 days
  </div>
</header>

<main class="dash-body">

  <!-- KPI Row -->
  <div class="kpi-row">
    <div class="kpi-card" style="--i:0; --kpi-accent:var(--accent)">
      <div class="kpi-card__label">Requests / day</div>
      <div class="kpi-card__value">142k</div>
      <div class="kpi-card__trend kpi-card__trend--up">↑ 12% vs last month</div>
    </div>
    <div class="kpi-card" style="--i:1; --kpi-accent:var(--green)">
      <div class="kpi-card__label">P95 Latency</div>
      <div class="kpi-card__value">48ms</div>
      <div class="kpi-card__trend kpi-card__trend--up">↓ 8ms improvement</div>
    </div>
    <div class="kpi-card" style="--i:2; --kpi-accent:var(--red)">
      <div class="kpi-card__label">Error Rate</div>
      <div class="kpi-card__value">0.3%</div>
      <div class="kpi-card__trend kpi-card__trend--down">↑ 0.1pp this week</div>
    </div>
    <div class="kpi-card" style="--i:3; --kpi-accent:var(--amber)">
      <div class="kpi-card__label">Uptime</div>
      <div class="kpi-card__value">99.9%</div>
      <div class="kpi-card__trend kpi-card__trend--flat">= 3 maintenance windows</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-card__title">Daily Requests</div>
      <div class="chart-card__subtitle">Rolling 14 days — thousands</div>
      <canvas id="barChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-card__title">P95 Latency Trend</div>
      <div class="chart-card__subtitle">Rolling 14 days — milliseconds</div>
      <canvas id="lineChart"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="table-section">
    <p class="section-label">Endpoint Breakdown</p>
    <div class="table-wrap">
      <div class="table-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th>Endpoint</th>
              <th>Method</th>
              <th class="num">Req/day</th>
              <th class="num">P95 ms</th>
              <th class="num">Err%</th>
              <th>Trend</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>/api/generate</code></td>
              <td><span class="method method--post">POST</span></td>
              <td class="num">48,201</td><td class="num">62</td><td class="num">0.2</td>
              <td><svg class="sparkline" viewBox="0 0 60 20" width="60" height="20"><polyline points="0,15 10,12 20,16 30,8 40,10 50,6 60,4" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"/></svg></td>
              <td><span class="status status--healthy">Healthy</span></td>
            </tr>
            <tr>
              <td><code>/api/files</code></td>
              <td><span class="method method--get">GET</span></td>
              <td class="num">31,440</td><td class="num">24</td><td class="num">0.1</td>
              <td><svg class="sparkline" viewBox="0 0 60 20" width="60" height="20"><polyline points="0,12 10,10 20,11 30,9 40,10 50,8 60,9" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"/></svg></td>
              <td><span class="status status--healthy">Healthy</span></td>
            </tr>
            <tr>
              <td><code>/api/search</code></td>
              <td><span class="method method--post">POST</span></td>
              <td class="num">22,890</td><td class="num">108</td><td class="num">0.5</td>
              <td><svg class="sparkline" viewBox="0 0 60 20" width="60" height="20"><polyline points="0,8 10,10 20,9 30,14 40,11 50,16 60,13" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-linecap="round"/></svg></td>
              <td><span class="status status--degraded">Degraded</span></td>
            </tr>
            <tr>
              <td><code>/api/auth/token</code></td>
              <td><span class="method method--post">POST</span></td>
              <td class="num">12,100</td><td class="num">55</td><td class="num">1.2</td>
              <td><svg class="sparkline" viewBox="0 0 60 20" width="60" height="20"><polyline points="0,12 10,14 20,10 30,16 40,18 50,15 60,17" fill="none" stroke="var(--red)" stroke-width="1.5" stroke-linecap="round"/></svg></td>
              <td><span class="status status--alert">Alert</span></td>
            </tr>
            <tr>
              <td><code>/api/webhooks</code></td>
              <td><span class="method method--post">POST</span></td>
              <td class="num">18,300</td><td class="num">38</td><td class="num">0.3</td>
              <td><svg class="sparkline" viewBox="0 0 60 20" width="60" height="20"><polyline points="0,10 10,11 20,9 30,10 40,8 50,9 60,10" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/></svg></td>
              <td><span class="status status--healthy">Healthy</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<script>
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const textColor  = '#64748b';
  const gridColor  = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
  const accentClr  = isDark ? '#22d3ee' : '#0891b2';
  const greenClr   = isDark ? '#34d399' : '#059669';

  const labels = ['Mar 1','Mar 3','Mar 5','Mar 7','Mar 9','Mar 11','Mar 13','Mar 15','Mar 17','Mar 19','Mar 21','Mar 23','Mar 25','Mar 27'];

  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Requests (k)',
        data: [118,125,131,128,142,138,145,140,152,148,155,149,158,142],
        backgroundColor: isDark ? 'rgba(34,211,238,0.22)' : 'rgba(8,145,178,0.18)',
        borderColor: accentClr,
        borderWidth: 1.5,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: textColor, font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } },
      }
    }
  });

  new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'P95 latency (ms)',
        data: [62,58,54,56,52,50,48,52,46,48,44,46,50,48],
        borderColor: greenClr,
        backgroundColor: isDark ? 'rgba(52,211,153,0.07)' : 'rgba(5,150,105,0.06)',
        borderWidth: 2,
        tension: 0.35,
        fill: true,
        pointRadius: 2,
        pointBackgroundColor: greenClr,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: textColor, font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } },
      }
    }
  });
</script>
</body>
</html>
